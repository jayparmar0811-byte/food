<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Stall - Jay Babari</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: rgb(118, 118, 212);
            padding-bottom: 140px; /* Cart mate vadhare jagya */
        }

        header {
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-container {
            background: #fff;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            position: sticky;
            top: 70px; /* Header ni niche */
            z-index: 99;
        }

        input#searchInput {
            width: 65%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px; /* Zooming issue na thase iPhone ma */
        }

        .home-btn {
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Responsive Grid */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            padding: 15px;
        }

        .product-card {
            background: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .product-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Cart Section - Mobile Optimized */
        .cart-section {
            background: rgb(39, 15, 175);
            color: white;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            flex-direction: column; /* Phone ma upar niche aavshe */
            align-items: center;
            gap: 10px;
            box-sizing: border-box;
            z-index: 100;
            border-radius: 15px 15px 0 0;
        }

        /* --- Modal & Form Styling --- */
        #productModal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            overflow: auto;
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 20px;
            border-radius: 15px;
            width: 90%; /* Phone mate vadhare poholu */
            max-width: 400px;
            text-align: center;
            position: relative;
            animation: zoomIn 0.3s;
        }

        .close { position: absolute; right: 15px; top: 5px; font-size: 35px; cursor: pointer; }

        #modalImg { width: 100%; border-radius: 10px; height: 200px; object-fit: cover; }

        #order-form {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 85%;
            max-width: 320px;
            z-index: 1100;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input { width: 92%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
        
        .buy-btn { 
            background: #28a745; 
            padding: 12px 25px; 
            border: none; 
            cursor: pointer; 
            color: white; 
            border-radius: 5px; 
            font-weight: bold; 
            width: 100%; /* Phone ma full width button */
        }

        /* --- Phone Mate Khas Badlav --- */
        @media (max-width: 480px) {
            .products {
                grid-template-columns: repeat(2, 1fr); /* Ek line ma 2 item */
                gap: 10px;
                padding: 10px;
            }
            .product-card { padding: 8px; }
            .product-card h3 { font-size: 15px; margin: 5px 0; }
            .product-card img { height: 110px; }
            header h2 { font-size: 20px; }
            .cart-section { padding: 10px; }
        }

        @keyframes zoomIn { from {transform: scale(0)} to {transform: scale(1)} }
    </style>
</head>
<body>

<header>
    <h2>Food Stall</h2>
    <p>Taste jo dil jeet le</p>
</header>

<div class="search-container">
    <button class="home-btn" onclick="window.location.reload()">Home</button>
    <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchFunction()">
</div>

<section class="products" id="product-list"></section>

<div id="productModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="">
        <h2 id="modalName"></h2>
        <p id="modalPrice" style="font-size: 1.2em; color: #28a745; font-weight: bold;"></p>
        <p>Amari khas vangi, ek var jarur try karo!</p>
        <button class="buy-btn" id="modalAddBtn">Add to Cart</button>
    </div>
</div>

<div class="cart-section">
    <div style="font-size: 15px;">
        🛒 Cart: <span id="cart-count">0</span> | Total: ₹<span id="total-price">0</span>
    </div>
    <button class="buy-btn" style="width: auto; padding: 8px 20px;" onclick="checkout()">Buy Now</button>
</div>

<div id="order-form">
    <h3>Buyer Details</h3>
    <input type="text" id="cust-name" placeholder="Tamaru Naam">
    <input type="number" id="cust-mobile" placeholder="Mobile Number">
    <input type="text" id="cust-address" placeholder="Address">
    <button class="buy-btn" onclick="submitOrder()">WhatsApp Order</button>
    <button onclick="document.getElementById('order-form').style.display='none'" style="margin-top:10px; background:grey; color:white; border:none; padding:8px; width:100%; border-radius: 5px;">Cancel</button>
</div>

<script>
const products = [
    { id: 1, name: "Burger", price: 50, image: "b50d22aed638664f17fe53e43680d7c8.jpg" },
    { id: 2, name: "Samosa", price: 50, image: "OIP (8).jpg" },
    { id: 3, name: "Vadapau", price: 50, image: "OIP.jpg" },
    { id: 4, name: "Paubhaji", price: 50, image: "OIP (5).jpg" },
    { id: 5, name: "Momos", price: 50, image: "0b5eb439a0fe2c71aa7b427d3402e1ea.jpg" },
    { id: 6, name: "Icecream", price: 50, image: "OIP (6).jpg" },
    { id: 7, name: "Tea", price: 20, image: "OIP (2).jpg" },
    { id: 8, name: "Coffi", price: 20, image: "OIP (4).jpg" },
    { id: 9, name: "Cold Drink", price: 20, image: "OIP (9).jpg" }
];

let cart = [];

function render(filteredProducts = products) {
    const list = document.getElementById('product-list');
    list.innerHTML = filteredProducts.map(p => `
        <div class="product-card">
            <img src="${p.image}" onclick="openModal(${p.id})" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>₹${p.price}</p>
            <button class="buy-btn" onclick="addToCart(${p.id})">Add</button>
        </div>
    `).join('');
}

function searchFunction() {
    let query = document.getElementById('searchInput').value.toLowerCase();
    let filtered = products.filter(p => p.name.toLowerCase().includes(query));
    render(filtered);
}

function openModal(id) {
    const item = products.find(p => p.id === id);
    document.getElementById('modalImg').src = item.image;
    document.getElementById('modalName').innerText = item.name;
    document.getElementById('modalPrice').innerText = "Price: ₹" + item.price;
    document.getElementById('modalAddBtn').onclick = function() {
        addToCart(item.id);
        closeModal();
    };
    document.getElementById('productModal').style.display = "block";
}

function closeModal() { document.getElementById('productModal').style.display = "none"; }

function addToCart(id) {
    const item = products.find(p => p.id === id);
    cart.push(item);
    updateCart();
}

function updateCart() {
    document.getElementById('cart-count').innerText = cart.length;
    const total = cart.reduce((sum, i) => sum + i.price, 0);
    document.getElementById('total-price').innerText = total;
}

function checkout() {
    if(cart.length === 0) { alert("Cart khali che!"); return; }
    document.getElementById('order-form').style.display = "block";
}

function submitOrder() {
    const name = document.getElementById('cust-name').value;
    const mobile = document.getElementById('cust-mobile').value;
    const address = document.getElementById('cust-address').value;
    if(!name || !mobile || !address) { alert("Badhi mahiti bhari do!"); return; }

    let message = `🧾 *New Order*\n👤 Name: ${name}\n📞 Mobile: ${mobile}\n📍 Address: ${address}\n\n🛒 Items:\n`;
    cart.forEach((item, index) => { message += `${index + 1}. ${item.name} - ₹${item.price}\n`; });
    message += `\n💰 *Total: ₹${document.getElementById('total-price').innerText}*`;

    window.open("https://wa.me/918980948396?text=" + encodeURIComponent(message), "_blank");
}

window.onclick = function(event) {
    if (event.target == document.getElementById('productModal')) closeModal();
}

render();
</script>
</body>
</html>
